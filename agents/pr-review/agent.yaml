spec_version: "0.1.0"
name: pr-review
version: 1.0.0
description: Reviews pull requests and code snippets with constructive feedback

model:
  preferred: "openai:gpt-4o-mini"
  constraints:
    temperature: 0.2
    max_tokens: 8192

tools: [read, memory]

runtime:
  max_turns: 20

compliance:
  risk_level: low
